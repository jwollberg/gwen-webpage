# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: gwengreenwood/gwen-webpage
  branch: main

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "categories"
    label: "Poem Categories"
    folder: "src/content/categories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{order}}. {{title}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Display order", name: "order", widget: "number", required: false, value_type: "int", min: 1, hint: "Lower numbers show first on the published Poetry page. Use 1, 2, 3, and so on." }
      - { label: "Category name", name: "title", widget: "string" }
      - { label: "Background image", name: "image", widget: "image", required: false, choose_url: false }
      - { label: "Background image brightness", name: "imageBrightness", widget: "number", required: false, default: 100, value_type: "int", min: 20, max: 160, step: 5, after_input: "%", hint: "100 is normal. Lower makes the image darker; higher makes it brighter." }
      - { label: "Text color", name: "textColor", widget: "color", required: false, hint: "Default is white if this is left blank." }
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "theme"
        label: "Colors and Fonts"
        file: "src/content/settings/theme.md"
        format: "frontmatter"
        fields:
          - { label: "Whole site background color", name: "siteBackgroundColor", widget: "color", required: false }
          - { label: "Dark panel color", name: "panelBackgroundColor", widget: "color", required: false }
          - { label: "Deep panel color", name: "deepPanelColor", widget: "color", required: false }
          - { label: "Light text box color", name: "lightPanelColor", widget: "color", required: false }
          - { label: "Soft light color", name: "lightPanelSoftColor", widget: "color", required: false }
          - { label: "Main light text color", name: "mainTextColor", widget: "color", required: false }
          - { label: "Muted text color", name: "mutedTextColor", widget: "color", required: false }
          - { label: "Text color on light boxes", name: "lightPanelTextColor", widget: "color", required: false }
          - { label: "Accent color", name: "accentColor", widget: "color", required: false }
          - { label: "Muted accent color", name: "accentMutedColor", widget: "color", required: false }
          - { label: "Button color", name: "buttonColor", widget: "color", required: false }
          - { label: "Link color", name: "linkColor", widget: "color", required: false }
          - label: "Body font"
            name: "bodyFont"
            widget: "select"
            required: false
            options:
              - { label: "Clean system sans", value: "system-sans" }
              - { label: "Cormorant Garamond", value: "cormorant-garamond" }
              - { label: "Libre Baskerville", value: "libre-baskerville" }
              - { label: "Lora", value: "lora" }
              - { label: "Merriweather", value: "merriweather" }
              - { label: "Playfair Display", value: "playfair-display" }
              - { label: "System serif", value: "system-serif" }
          - label: "Heading font"
            name: "headingFont"
            widget: "select"
            required: false
            options:
              - { label: "Cormorant Garamond", value: "cormorant-garamond" }
              - { label: "Playfair Display", value: "playfair-display" }
              - { label: "Libre Baskerville", value: "libre-baskerville" }
              - { label: "Lora", value: "lora" }
              - { label: "Merriweather", value: "merriweather" }
              - { label: "System serif", value: "system-serif" }
          - label: "Site name font"
            name: "brandFont"
            widget: "select"
            required: false
            options:
              - { label: "Ms Madi script", value: "ms-madi" }
              - { label: "Cormorant Garamond", value: "cormorant-garamond" }
              - { label: "Playfair Display", value: "playfair-display" }
              - { label: "Lora", value: "lora" }
      - name: "home"
        label: "Home Page"
        file: "src/content/settings/home.md"
        format: "frontmatter"
        fields:
          - label: "Background type"
            name: "backgroundType"
            widget: "select"
            required: false
            options:
              - { label: "Use background image", value: "image" }
              - { label: "Use background color only", value: "color" }
          - { label: "Background color", name: "backgroundColor", widget: "color", required: false }
          - { label: "Background image", name: "backgroundImage", widget: "image", required: false, choose_url: false }
          - { label: "Background image brightness", name: "backgroundBrightness", widget: "number", required: false, default: 100, value_type: "int", min: 20, max: 160, step: 5, after_input: "%", hint: "100 is normal. Lower makes the image darker; higher makes it brighter." }
          - label: "Background image position"
            name: "backgroundPosition"
            widget: "select"
            required: false
            options:
              - { label: "Center", value: "center" }
              - { label: "Top", value: "top" }
              - { label: "Bottom", value: "bottom" }
              - { label: "Left", value: "left" }
