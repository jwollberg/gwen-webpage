          - { label: "Extra text box", name: "bodyText", widget: "text", required: false }
          - { label: "Website editor section text", name: "websiteEditorText", widget: "text", required: false }
          - { label: "File folders section text", name: "foldersText", widget: "text", required: false }
          - { label: "New poem template section text", name: "templateIntro", widget: "text", required: false }
          - { label: "Publish flow section text", name: "publishFlowIntro", widget: "text", required: false }
  - name: "poems"
    label: "Poems"
    folder: "src/content/poems"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "categories"
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
      - { label: "Background image", name: "image", widget: "image", required: false, choose_url: false }
      - { label: "Background image brightness", name: "imageBrightness", widget: "number", required: false, default: 100, value_type: "int", min: 20, max: 160, step: 5, after_input: "%", hint: "100 is normal. Lower makes the image darker; higher makes it brighter." }
      - { label: "Poem text color", name: "textColor", widget: "color", required: false, hint: "Default is white if this is left blank." }
      - { label: "Music", name: "music", widget: "file", required: false, choose_url: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Poem", name: "body", widget: "markdown" }
