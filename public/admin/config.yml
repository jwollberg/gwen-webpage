          - { label: "Image description", name: "embeddedImageAlt", widget: "string", required: false, hint: "Short description for screen readers." }
          - label: "Image position"
            name: "embeddedImagePosition"
            widget: "select"
            required: false
            options:
              - { label: "Right of text", value: "right" }
              - { label: "Left of text", value: "left" }
